substitutions:
  _REGION: us-central1
  _REPO: us-central1-docker.pkg.dev/aham-store/rag-images
  _SERVICE: rag-ingest

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --platform
      - linux/amd64
      - -t
      - $_REPO/$_SERVICE:$SHORT_SHA
      - ./ingest

  - id: tag-latest
    name: gcr.io/cloud-builders/docker
    args:
      - tag
      - $_REPO/$_SERVICE:$SHORT_SHA
      - $_REPO/$_SERVICE:latest

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_REPO/$_SERVICE:$SHORT_SHA

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_REPO/$_SERVICE:latest

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_REPO/$_SERVICE:$SHORT_SHA
      - --region=$_REGION
      - --project=aham-store

images:
  - $_REPO/$_SERVICE:$SHORT_SHA
  - $_REPO/$_SERVICE:latest

options:
  logging: CLOUD_LOGGING_ONLY
