apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-api
  template:
    metadata:
      labels:
        app: rag-api
    spec:
      serviceAccountName: rag-api-ksa   # Workload Identity KSA
      containers:
        - name: rag-api
          image: us-central1-docker.pkg.dev/aham-store/rag-images/rag-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: GCP_PROJECT_ID
              value: "aham-store"
            - name: GCP_LOCATION
              value: "us-central1"
            - name: CORS_ALLOWED_ORIGINS
              value: "https://storage.googleapis.com"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 30
